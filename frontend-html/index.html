<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Yatra - Book Bus Tickets Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="splash-container">
        <div class="splash-content">
            <div class="logo-3d">
                <svg class="bus-3d-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#0CAF60;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <g transform="translate(100,100)">
                        <rect x="-50" y="-30" width="100" height="60" rx="8" fill="url(#grad1)"/>
                        <rect x="-40" y="-20" width="20" height="15" rx="2" fill="white" opacity="0.9"/>
                        <rect x="-10" y="-20" width="20" height="15" rx="2" fill="white" opacity="0.9"/>
                        <rect x="20" y="-20" width="20" height="15" rx="2" fill="white" opacity="0.9"/>
                        <circle cx="-25" cy="35" r="10" fill="#1E293B"/>
                        <circle cx="25" cy="35" r="10" fill="#1E293B"/>
                    </g>
                </svg>
            </div>
            <h1 class="brand-text">BUS YATRA</h1>
            <p class="brand-tagline">Your Journey, Our Priority</p>
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
    <script>
        setTimeout(() => {
            const splash = document.querySelector('.splash-container');
            splash.style.opacity = '0';
            setTimeout(() => window.location.href = 'login.html', 600);
        }, 2800);
    </script>
</body>
</html>
