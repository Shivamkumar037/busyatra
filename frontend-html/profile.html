<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Profile</h1>
        </header>

        <main class="main-content">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <span id="user-initial">U</span>
                    </div>
                    <h2 id="user-name">User Name</h2>
                    <p id="user-email">email@example.com</p>
                </div>

                <div class="profile-details">
                    <div class="detail-item">
                        <span class="detail-label">Role:</span>
                        <span id="user-role" class="detail-value">USER</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Mobile:</span>
                        <span id="user-mobile" class="detail-value">Not provided</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Verified:</span>
                        <span id="user-verified" class="detail-value">No</span>
                    </div>
                </div>

                <button id="logout-btn" class="btn btn-danger btn-block">
                    Logout
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="home.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="my-tickets.html" class="nav-item">
                <span class="nav-icon">🎫</span>
                <span class="nav-label">My Tickets</span>
            </a>
            <a href="cancel-ticket.html" class="nav-item">
                <span class="nav-icon">❌</span>
                <span class="nav-label">Cancel</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </a>
        </nav>
    </div>

    <div id="notification" class="notification"></div>
    <script src="js/app.js"></script>
</body>
</html>
