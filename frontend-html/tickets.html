<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tickets - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tickets-wrap{padding:24px 16px 100px;}
        .ticket-card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm);border-left:4px solid var(--primary-green);}
        .ticket-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
        .ticket-id{font-weight:700;color:var(--text-dark);}
        .status-badge{padding:4px 12px;border-radius:20px;font-size:0.875rem;font-weight:600;}
        .status-confirmed{background:rgba(12,175,96,0.1);color:var(--primary-green);}
        .status-pending{background:rgba(251,191,36,0.1);color:#F59E0B;}
        .status-cancelled{background:rgba(239,68,68,0.1);color:#EF4444;}
        .detail-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.95rem;}
        .detail-label{color:var(--text-gray);}
        .detail-value{font-weight:600;color:var(--text-dark);}
    </style>
</head>
<body>
    <div class="tickets-wrap">
        <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:8px;">My Tickets</h1>
        <p style="color:var(--text-gray);margin-bottom:24px;">View all your bookings</p>
        <div id="ticketsContainer"><p style="text-align:center;color:var(--text-gray);padding:40px;">Loading...</p></div>
    </div>
    <nav class="bottom-nav">
        <a href="home.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span class="nav-label">Home</span></a>
        <a href="tickets.html" class="nav-btn active"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg><span class="nav-label">Tickets</span></a>
        <a href="cancel.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg><span class="nav-label">Cancel</span></a>
        <a href="profile.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg><span class="nav-label">Profile</span></a>
    </nav>
    <div id="toast" class="toast"></div>
    <script src="js/tickets.js"></script>
</body>
</html>
