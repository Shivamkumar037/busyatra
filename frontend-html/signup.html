<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join us for seamless bus booking</p>
            </div>

            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" required pattern="[0-9]{10}" placeholder="10-digit mobile number">
                </div>

                <div class="form-group">
                    <label for="aadhaar">Aadhaar Number (Optional)</label>
                    <input type="text" id="aadhaar" name="aadhaar" pattern="[0-9]{12}" placeholder="12-digit aadhaar number">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="Minimum 6 characters">
                </div>

                <div class="form-group">
                    <label for="role">I am a</label>
                    <select id="role" name="role" required>
                        <option value="USER">Passenger</option>
                        <option value="DRIVER">Driver</option>
                        <option value="CONDUCTOR">Conductor</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" id="signup-btn">
                    <span>Sign Up</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otp-modal" class="modal">
        <div class="modal-content">
            <h2>Verify OTP</h2>
            <p>Enter the 6-digit OTP sent to your email</p>
            <form id="otp-form">
                <div class="form-group">
                    <input type="text" id="otp" name="otp" required pattern="[0-9]{6}" placeholder="Enter OTP" maxlength="6">
                </div>
                <button type="submit" class="btn btn-primary">Verify</button>
            </form>
        </div>
    </div>

    <div id="notification" class="notification"></div>
    <script src="js/auth.js"></script>
</body>
</html>
