<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Bus Yatra</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-brand">Bus Yatra</h2>
                <p style="font-size: 0.875rem; color: var(--text-gray); margin-top: 4px;">Admin Panel</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#overview" class="nav-item active" data-page="overview">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM14 12a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-4a1 1 0 01-1-1v-7z"></path>
                    </svg>
                    <span>Overview</span>
                </a>
                <a href="#add-bus" class="nav-item" data-page="add-bus">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    <span>Add Bus</span>
                </a>
                <a href="#manage-buses" class="nav-item" data-page="manage-buses">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    <span>Manage Buses</span>
                </a>
                <a href="#add-route" class="nav-item" data-page="add-route">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path>
                    </svg>
                    <span>Add Route</span>
                </a>
                <a href="#schedules" class="nav-item" data-page="schedules">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span>Schedules</span>
                </a>
                <a href="#bookings" class="nav-item" data-page="bookings">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path>
                    </svg>
                    <span>All Bookings</span>
                </a>
            </nav>
            <div style="padding: 16px; margin-top: auto;">
                <button id="logoutBtn" class="btn btn-primary" style="width: 100%; background: linear-gradient(135deg, #EF4444, #DC2626);">
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h1 class="page-title" id="pageTitle">Dashboard Overview</h1>
                    <p style="color: var(--text-gray); margin-top: 4px;">Manage your bus reservation system</p>
                </div>
                <div class="user-info">
                    <img src="https://images.pexels.com/photos/5380431/pexels-photo-5380431.jpeg" alt="Admin" class="user-avatar">
                    <span style="font-weight: 600;" id="adminName">Admin</span>
                </div>
            </div>

            <div id="content">
                <!-- Stats Grid -->
                <div class="grid-4" style="margin-bottom: 24px;">
                    <div class="stat-card card-3d">
                        <div class="stat-value">0</div>
                        <div class="stat-label">Total Buses</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-value">0</div>
                        <div class="stat-label">Active Routes</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-value">0</div>
                        <div class="stat-label">Total Bookings</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-value">₹0</div>
                        <div class="stat-label">Revenue</div>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="card">
                    <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 20px;">Recent Activity</h3>
                    <p style="color: var(--text-gray);">No recent activity to display</p>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="../js/admin.js"></script>
</body>
</html>
