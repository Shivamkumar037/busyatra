<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>Bus Yatra</h1>
                <button id="logout-btn" class="btn-icon">
                    <span>Logout</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="search-section">
                <h2>Search Buses</h2>
                <form id="search-form" class="search-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="source">From</label>
                            <select id="source" name="source" required>
                                <option value="">Select Source City</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="destination">To</label>
                            <select id="destination" name="destination" required>
                                <option value="">Select Destination City</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="travel-date">Travel Date</label>
                            <input type="date" id="travel-date" name="travel-date" required>
                        </div>

                        <div class="form-group">
                            <label for="bus-no">Bus Number (Optional)</label>
                            <input type="text" id="bus-no" name="bus-no" placeholder="Enter bus number">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Search Buses
                    </button>
                </form>
            </div>

            <!-- Today's Buses -->
            <div class="today-buses-section">
                <h2>Today's Available Buses</h2>
                <div id="today-buses" class="bus-list">
                    <p class="loading">Loading...</p>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="my-tickets.html" class="nav-item">
                <span class="nav-icon">🎫</span>
                <span class="nav-label">My Tickets</span>
            </a>
            <a href="cancel-ticket.html" class="nav-item">
                <span class="nav-icon">❌</span>
                <span class="nav-label">Cancel</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </a>
        </nav>
    </div>

    <div id="notification" class="notification"></div>
    <script src="js/app.js"></script>
</body>
</html>
