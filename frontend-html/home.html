<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .home-wrap{padding:0 0 80px;}
        .hero-home{background:linear-gradient(135deg,var(--primary-blue),var(--primary-green));color:white;padding:32px 20px;border-radius:0 0 32px 32px;margin-bottom:24px;}
        .hero-home h1{font-size:1.75rem;font-weight:700;margin-bottom:8px;}
        .features-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:20px;}
        .feature-box{background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);padding:16px;border-radius:16px;text-align:center;color:white;}
        .feature-box h4{font-size:0.9rem;margin-top:8px;font-weight:600;}
        .search-box{background:white;margin:0 20px 24px;padding:24px;border-radius:20px;box-shadow:var(--shadow-md);}
        .bus-list{padding:0 20px;}
        .bus-card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm);transition:all 0.3s;}
        .bus-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
        .bus-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
        .bus-num{font-size:1.25rem;font-weight:700;}
        .bus-badge{background:linear-gradient(135deg,var(--primary-green),var(--secondary-blue));color:white;padding:4px 12px;border-radius:20px;font-size:0.875rem;font-weight:600;}
        .bus-route{color:var(--text-gray);margin-bottom:8px;}
        .bus-foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
        .price{font-size:1.5rem;font-weight:800;color:var(--primary-green);}
        .btn-book{background:var(--primary-green);color:white;padding:10px 24px;border:none;border-radius:12px;font-weight:600;cursor:pointer;}
        .btn-book:hover{background:#0a9550;transform:scale(1.05);}
    </style>
</head>
<body>
    <div class="home-wrap">
        <div class="hero-home">
            <h1>🙏 Welcome back!</h1>
            <p style="opacity:0.95;font-size:0.95rem;">Book your next journey with India's smartest platform</p>
            <div class="features-row">
                <div class="feature-box"><div style="font-size:2rem;">🤖</div><h4>AI Recommendations</h4></div>
                <div class="feature-box"><div style="font-size:2rem;">📍</div><h4>Live Tracking</h4></div>
                <div class="feature-box"><div style="font-size:2rem;">💰</div><h4>Best Prices</h4></div>
                <div class="feature-box"><div style="font-size:2rem;">🎁</div><h4>Cashback</h4></div>
            </div>
        </div>
        <div class="search-box">
            <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:20px;">Search Buses</h2>
            <form id="searchForm">
                <div class="form-group"><label class="form-label">From</label><input type="text" id="source" class="form-input" placeholder="Source city" required></div>
                <div class="form-group"><label class="form-label">To</label><input type="text" id="destination" class="form-input" placeholder="Destination" required></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group"><label class="form-label">Date</label><input type="date" id="date" class="form-input" required></div>
                    <div class="form-group"><label class="form-label">Bus No</label><input type="text" id="busNo" class="form-input" placeholder="Optional"></div>
                </div>
                <button type="submit" class="btn btn-primary"><span>Search Buses 🔍</span></button>
            </form>
        </div>
        <div class="bus-list">
            <h3 style="font-size:1.25rem;font-weight:700;margin-bottom:16px;">Today's Buses</h3>
            <div id="todayBuses"><p style="text-align:center;color:var(--text-gray);padding:20px;">Loading...</p></div>
        </div>
    </div>
    <nav class="bottom-nav">
        <a href="home.html" class="nav-btn active"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span class="nav-label">Home</span></a>
        <a href="tickets.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg><span class="nav-label">Tickets</span></a>
        <a href="cancel.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg><span class="nav-label">Cancel</span></a>
        <a href="profile.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg><span class="nav-label">Profile</span></a>
    </nav>
    <div id="toast" class="toast"></div>
    <script src="js/home.js"></script>
</body>
</html>
