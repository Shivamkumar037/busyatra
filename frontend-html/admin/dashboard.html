<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Bus Yatra</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .sidebar { display:flex; flex-direction:column; }
        .sidebar-nav { flex:1; }
        .nav-section-label {
            font-size:0.7rem;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:1px;
            color:var(--text-gray);
            padding:16px 16px 8px;
            opacity:0.7;
        }
        @media (max-width:1024px) {
            .sidebar { transform:translateX(-100%); position:fixed; z-index:200; }
            .sidebar.open { transform:translateX(0); }
            .main-content { margin-left:0 !important; }
            .menu-toggle { display:block !important; }
        }
        .menu-toggle {
            display:none;
            background:none;
            border:none;
            cursor:pointer;
            padding:8px;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-brand">Bus Yatra</h2>
                <p style="font-size:0.875rem;color:var(--text-gray);margin-top:4px;">Admin Panel</p>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">Main</div>
                <a href="#overview" class="nav-item active" data-page="overview" data-testid="nav-overview">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM14 14a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1h-4a1 1 0 01-1-1v-3z"></path></svg>
                    <span>Overview</span>
                </a>

                <div class="nav-section-label">Bus Management</div>
                <a href="#add-bus" class="nav-item" data-page="add-bus" data-testid="nav-add-bus">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>Add Bus</span>
                </a>
                <a href="#buses" class="nav-item" data-page="buses" data-testid="nav-manage-buses">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    <span>Manage Buses</span>
                </a>

                <div class="nav-section-label">Route Management</div>
                <a href="#add-route" class="nav-item" data-page="add-route" data-testid="nav-add-route">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>Add Route</span>
                </a>
                <a href="#routes" class="nav-item" data-page="routes" data-testid="nav-manage-routes">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 16.382V5.618a1 1 0 00-1.447-.894L15 7m0 10V7m0 0L9 4"></path></svg>
                    <span>Manage Routes</span>
                </a>

                <div class="nav-section-label">Scheduling</div>
                <a href="#add-schedule" class="nav-item" data-page="add-schedule" data-testid="nav-add-schedule">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>Create Schedule</span>
                </a>
                <a href="#schedules" class="nav-item" data-page="schedules" data-testid="nav-schedules">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span>View Schedules</span>
                </a>

                <div class="nav-section-label">Bookings</div>
                <a href="#bookings" class="nav-item" data-page="bookings" data-testid="nav-bookings">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg>
                    <span>All Bookings</span>
                </a>
            </nav>
            <div style="padding:16px;">
                <button id="logoutBtn" data-testid="admin-logout-btn" class="btn btn-primary" style="width:100%;background:linear-gradient(135deg,#EF4444,#DC2626);">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div>
                        <h1 class="page-title" id="pageTitle">Dashboard Overview</h1>
                        <p style="color:var(--text-gray);margin-top:4px;">Manage your bus system</p>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary-green),var(--secondary-blue));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;">A</div>
                    <span style="font-weight:600;" id="adminName" data-testid="admin-name">Admin</span>
                </div>
            </div>
            <div id="content" data-testid="admin-content">
                <!-- Dynamic content loads here -->
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="../js/admin.js"></script>
</body>
</html>
