<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-wrap{padding:24px 16px 100px;max-width:600px;margin:0 auto;}
        .profile-head{background:linear-gradient(135deg,var(--primary-blue),var(--primary-green));border-radius:20px;padding:32px 24px;text-align:center;margin-bottom:24px;color:white;}
        .profile-avatar{width:80px;height:80px;border-radius:50%;background:white;color:var(--primary-green);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;margin:0 auto 16px;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
        .info-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
        .info-row:last-child{border:none;}
    </style>
</head>
<body>
    <div class="profile-wrap">
        <div class="profile-head">
            <div class="profile-avatar" id="userInitial">U</div>
            <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:4px;" id="userName">User</h1>
            <p style="opacity:0.9;font-size:0.95rem;" id="userEmail">email@example.com</p>
        </div>
        <div class="card">
            <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:16px;">Account Info</h3>
            <div class="info-row"><span style="color:var(--text-gray);">Role</span><span style="font-weight:600;" id="userRole">USER</span></div>
            <div class="info-row"><span style="color:var(--text-gray);">Verified</span><span style="font-weight:600;" id="userVerified">No</span></div>
            <div class="info-row"><span style="color:var(--text-gray);">Member</span><span style="font-weight:600;">2024</span></div>
        </div>
        <button id="logoutBtn" class="btn btn-primary" style="width:100%;margin-top:24px;background:linear-gradient(135deg,#EF4444,#DC2626);"><span>Logout</span></button>
    </div>
    <nav class="bottom-nav">
        <a href="home.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span class="nav-label">Home</span></a>
        <a href="tickets.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg><span class="nav-label">Tickets</span></a>
        <a href="cancel.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg><span class="nav-label">Cancel</span></a>
        <a href="profile.html" class="nav-btn active"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg><span class="nav-label">Profile</span></a>
    </nav>
    <div id="toast" class="toast"></div>
    <script src="js/profile.js"></script>
</body>
</html>
