<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-hero">
            <div class="hero-content">
                <h1 class="hero-title">Join Bus Yatra</h1>
                <p class="hero-subtitle">Create an account and start your journey with us</p>
                <div class="hero-features">
                    <div class="feature-item">
                        <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        <span>Quick 2-minute signup</span>
                    </div>
                    <div class="feature-item">
                        <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <span>Secure & encrypted data</span>
                    </div>
                    <div class="feature-item">
                        <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>Exclusive offers & discounts</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="auth-form-section">
            <div class="auth-box">
                <div class="auth-header">
                    <h2 class="auth-title">Create Account</h2>
                    <p class="auth-subtitle">Join thousands of happy travelers</p>
                </div>

                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-input" placeholder="John Doe" required data-testid="signup-name">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="you@example.com" required data-testid="signup-email">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mobile Number</label>
                        <input type="tel" id="mobile" class="form-input" placeholder="10-digit mobile number" pattern="[0-9]{10}" required data-testid="signup-mobile">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Aadhaar Number (Optional)</label>
                        <input type="text" id="aadhaar" class="form-input" placeholder="12-digit aadhaar" pattern="[0-9]{12}" data-testid="signup-aadhaar">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Minimum 6 characters" minlength="6" required data-testid="signup-password">
                    </div>

                    <div class="form-group">
                        <label class="form-label">I am a</label>
                        <select id="role" class="form-select" required data-testid="signup-role">
                            <option value="USER">Passenger</option>
                            <option value="DRIVER">Driver</option>
                            <option value="CONDUCTOR">Conductor</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary" data-testid="signup-submit">
                        <span>Create Account</span>
                        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </button>
                </form>

                <div style="text-align: center; margin-top: 24px; color: var(--text-gray);">
                    <p>Already have an account? <a href="login.html" style="color: var(--primary-green); font-weight: 600; text-decoration: none;">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otpModal" class="modal-overlay">
        <div class="modal">
            <h3 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;">Verify OTP</h3>
            <p style="color: var(--text-gray); margin-bottom: 24px;">Enter the 6-digit code sent to your email</p>
            <form id="otpForm">
                <div class="form-group">
                    <input type="text" id="otpCode" class="form-input" placeholder="Enter 6-digit OTP" maxlength="6" pattern="[0-9]{6}" required data-testid="otp-input" style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem;">
                </div>
                <button type="submit" class="btn btn-primary" data-testid="otp-verify">Verify OTP</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="js/auth.js"></script>
</body>
</html>
