<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Yatra - Your Journey Partner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern-style.css">
</head>
<body>
    <div class="splash-container" data-testid="splash-screen">
        <div class="splash-content">
            <div class="logo-wrapper">
                <div class="bus-icon-3d">
                    <svg viewBox="0 0 200 200" class="bus-svg">
                        <defs>
                            <linearGradient id="busGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <g class="bus-body">
                            <rect x="40" y="60" width="120" height="80" rx="10" fill="url(#busGradient)"/>
                            <rect x="50" y="75" width="30" height="25" rx="3" fill="#93C5FD" opacity="0.8"/>
                            <rect x="85" y="75" width="30" height="25" rx="3" fill="#93C5FD" opacity="0.8"/>
                            <rect x="120" y="75" width="30" height="25" rx="3" fill="#93C5FD" opacity="0.8"/>
                            <circle cx="70" cy="145" r="12" fill="#1F2937"/>
                            <circle cx="130" cy="145" r="12" fill="#1F2937"/>
                            <circle cx="70" cy="145" r="6" fill="#6B7280"/>
                            <circle cx="130" cy="145" r="6" fill="#6B7280"/>
                        </g>
                    </svg>
                </div>
                <h1 class="brand-title" data-testid="app-title">
                    <span class="brand-word">BUS</span>
                    <span class="brand-word delay-1">YATRA</span>
                </h1>
            </div>
            <p class="tagline">Your Journey, Our Priority</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>
    <script>
        setTimeout(() => {
            document.querySelector('.splash-container').style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 600);
        }, 2500);
    </script>
</body>
</html>
