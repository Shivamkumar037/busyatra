<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bus Yatra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern-style.css">
</head>
<body class="auth-body">
    <div class="auth-split-layout">
        <div class="auth-hero" style="background: linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(30, 64, 175, 0.95)), url('https://static.prod-images.emergentagent.com/jobs/d6183d2d-11c0-4e28-844f-9bf9da36f30a/images/2a13dc82c2aa2ecd47cee53eca22ceea38d2eb3e72c3951030e9c7f1dd69cf2a.png'); background-size: cover; background-position: center;">
            <div class="hero-content">
                <h1 class="hero-title">Welcome Back!</h1>
                <p class="hero-subtitle">Continue your seamless bus booking experience</p>
                <div class="hero-features">
                    <div class="feature-item">
                        <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span>Real-time Seat Selection</span>
                    </div>
                    <div class="feature-item">
                        <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span>Instant Booking Confirmation</span>
                    </div>
                    <div class="feature-item">
                        <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span>Secure Payment Gateway</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="auth-form-section">
            <div class="auth-container">
                <div class="auth-header">
                    <h2 class="auth-title">Sign In</h2>
                    <p class="auth-subtitle">Enter your credentials to access your account</p>
                </div>

                <form id="login-form" class="modern-form" data-testid="login-form">
                    <div class="form-field">
                        <label class="field-label">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="you@example.com" class="modern-input" data-testid="email-input">
                    </div>

                    <div class="form-field">
                        <label class="field-label">Password</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••" class="modern-input" data-testid="password-input">
                    </div>

                    <button type="submit" class="btn-modern btn-primary" id="login-btn" data-testid="login-button">
                        <span>Sign In</span>
                        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html" class="auth-link" data-testid="signup-link">Create Account</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification-modern" data-testid="notification"></div>
    <script src="js/auth.js"></script>
</body>
</html>
