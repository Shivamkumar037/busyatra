<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-hero">
            <div class="hero-content">
                <h1 class="hero-title">Join Bus Yatra</h1>
                <p class="hero-subtitle">Experience the future of bus travel</p>
                <div class="hero-features">
                    <div class="feature-item">
                        <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span>💸 Earn Cashback on Every Booking</span>
                    </div>
                    <div class="feature-item">
                        <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span>👥 Group Booking Discounts</span>
                    </div>
                    <div class="feature-item">
                        <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        <span>🚨 SOS Emergency Support</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="auth-form-section">
            <div class="auth-box">
                <div class="auth-header">
                    <h2 class="auth-title">Create Account</h2>
                    <p class="auth-subtitle">Join thousands of happy travelers</p>
                </div>
                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-input" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Mobile</label>
                        <input type="tel" id="mobile" class="form-input" pattern="[0-9]{10}" placeholder="10-digit mobile" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Aadhaar (Optional)</label>
                        <input type="text" id="aadhaar" class="form-input" pattern="[0-9]{12}" placeholder="12-digit aadhaar">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" minlength="6" placeholder="Minimum 6 characters" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">I am a</label>
                        <select id="role" class="form-select" required>
                            <option value="USER">Passenger</option>
                            <option value="DRIVER">Driver</option>
                            <option value="CONDUCTOR">Conductor</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span>Create Account</span>
                        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </form>
                <p style="text-align:center;margin-top:24px;color:var(--text-gray);">Already have account? <a href="login.html" style="color:var(--primary-green);font-weight:600;text-decoration:none;">Sign In</a></p>
            </div>
        </div>
    </div>
    <div id="otpModal" class="modal-overlay">
        <div class="modal">
            <h3 style="font-size:1.5rem;font-weight:700;margin-bottom:8px;">Verify OTP</h3>
            <p style="color:var(--text-gray);margin-bottom:24px;">Enter 6-digit code sent to your email</p>
            <form id="otpForm">
                <div class="form-group">
                    <input type="text" id="otpCode" class="form-input" maxlength="6" pattern="[0-9]{6}" placeholder="000000" required style="text-align:center;font-size:1.5rem;letter-spacing:0.5rem;">
                </div>
                <button type="submit" class="btn btn-primary">Verify OTP</button>
            </form>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="js/auth.js"></script>
</body>
</html>
