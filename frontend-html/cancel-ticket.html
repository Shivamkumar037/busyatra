<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Ticket - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Cancel Ticket</h1>
        </header>

        <main class="main-content">
            <div class="cancel-form-container">
                <h2>Cancel Your Booking</h2>
                <form id="cancel-form">
                    <div class="form-group">
                        <label for="booking-id">Booking ID</label>
                        <input type="text" id="booking-id" name="booking-id" required placeholder="Enter your booking ID">
                    </div>

                    <div class="form-group">
                        <label for="reason">Reason for Cancellation (Optional)</label>
                        <textarea id="reason" name="reason" rows="4" placeholder="Tell us why you're cancelling"></textarea>
                    </div>

                    <div class="cancellation-policy">
                        <h3>Cancellation Policy</h3>
                        <ul>
                            <li>More than 7 days before travel: 90% refund</li>
                            <li>3-7 days before travel: 75% refund</li>
                            <li>1-2 days before travel: 50% refund</li>
                            <li>Same day: 25% refund</li>
                            <li>After travel date: No refund</li>
                        </ul>
                    </div>

                    <button type="submit" class="btn btn-danger btn-block">
                        Cancel Ticket
                    </button>
                </form>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="home.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="my-tickets.html" class="nav-item">
                <span class="nav-icon">🎫</span>
                <span class="nav-label">My Tickets</span>
            </a>
            <a href="cancel-ticket.html" class="nav-item active">
                <span class="nav-icon">❌</span>
                <span class="nav-label">Cancel</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </a>
        </nav>
    </div>

    <div id="notification" class="notification"></div>
    <script src="js/app.js"></script>
</body>
</html>
