<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Ticket - Bus Yatra</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cancel-wrap{padding:24px 16px 100px;max-width:600px;margin:0 auto;}
        .policy-box{background:linear-gradient(135deg,rgba(239,68,68,0.05),rgba(251,191,36,0.05));border-radius:16px;padding:20px;margin-top:24px;border:1px solid rgba(239,68,68,0.1);}
        .policy-list{list-style:none;padding:0;}
        .policy-list li{padding:8px 0;color:var(--text-gray);padding-left:24px;position:relative;}
        .policy-list li:before{content:"•";position:absolute;left:0;color:#EF4444;font-size:1.5rem;}
    </style>
</head>
<body>
    <div class="cancel-wrap">
        <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:8px;">Cancel Ticket</h1>
        <p style="color:var(--text-gray);margin-bottom:24px;">Cancel your bus booking</p>
        <div class="card">
            <form id="cancelForm">
                <div class="form-group"><label class="form-label">Booking ID</label><input type="text" id="bookingId" class="form-input" placeholder="Enter booking ID" required></div>
                <div class="form-group"><label class="form-label">Reason (Optional)</label><textarea id="reason" class="form-input" rows="4" placeholder="Why cancelling?" style="resize:vertical;"></textarea></div>
                <div class="policy-box">
                    <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:16px;">📋 Cancellation Policy</h3>
                    <ul class="policy-list">
                        <li>7+ days before: <strong>90% refund</strong></li>
                        <li>3-7 days: <strong>75% refund</strong></li>
                        <li>1-2 days: <strong>50% refund</strong></li>
                        <li>Same day: <strong>25% refund</strong></li>
                        <li>After travel: <strong>No refund</strong></li>
                    </ul>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:24px;background:#EF4444;"><span>Cancel Ticket</span></button>
            </form>
        </div>
    </div>
    <nav class="bottom-nav">
        <a href="home.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span class="nav-label">Home</span></a>
        <a href="tickets.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg><span class="nav-label">Tickets</span></a>
        <a href="cancel.html" class="nav-btn active"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg><span class="nav-label">Cancel</span></a>
        <a href="profile.html" class="nav-btn"><svg class="nav-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg><span class="nav-label">Profile</span></a>
    </nav>
    <div id="toast" class="toast"></div>
    <script src="js/cancel.js"></script>
</body>
</html>
